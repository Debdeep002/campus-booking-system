<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - College Booking</title>

    <link rel="stylesheet" href="https://code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.12.1/jquery-ui.min.js"></script>

    <style>
        /* --- CODEPEN CSS --- */
        @import url(https://fonts.googleapis.com/css?family=Open+Sans);
        @import url(https://fonts.googleapis.com/css?family=Open+Sans+Condensed:300,700);
        
        table { border-collapse:collapse; width: 100%; }
        html,body { font-family: 'Open Sans',sans-serif; transition: all ease 1s; margin:0; background: #f9f9f9; }
        .rbc * { font-family: 'Open Sans Condensed'; }
        .app-container { width:100%; border:1px solid gainsboro; height:100vh; background: white; }
        
        header { 
            width:100%; background:indianred; height:90px; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box;
        }
        
        /* Custom UI for Header Controls */
        .header-controls select, .header-controls input {
            padding: 8px; font-size: 14px; border-radius: 4px; border: none; margin-right: 10px;
        }
        .header-controls button {
            padding: 8px 15px; background: #246180; color: white; border: none; border-radius: 4px; cursor: pointer;
        }

        tr th, tr td { position: relative; padding:15px 25px; background: skyblue; width:150px; border:1px solid lightgray; text-align:center; }
        tr td { background:white; padding:8px; vertical-align:top; height:60px; text-align:left; transition: all ease 0.3s; cursor: pointer; }
        tr td.na { background: transparent; color:#03A9F4; cursor: not-allowed; }
        tr td.na strong { font-family:'Open Sans Condensed'; font-size:30px; font-weight:300; }
        tr th > .day_no { font-size:22px; }
        
        .location { color:#fff; vertical-align:middle; font-size:20px; text-align:left; background: #59989A; }
        .location p { margin:0px; font-size:12px; font-family:'Open Sans'; }
        .align-left { text-align:left; }
        .time-span { font-size:12px; color:green; display: block; margin-bottom: 5px; font-weight: bold;}
        .who_current { font-size:12px; display:block; color:green; }
        
        /* Hover Effect for empty cells */
        tr td:not(.na):not(.location):hover:after {
            content:'+'; width:34px; position:absolute; bottom:0px; right:0px; text-align:center;
            padding:2px; background:#0593AD; color:#fff; font-size:30px; line-height:1; cursor:pointer;
        }

        /* jQuery UI overrides from template */
        .ui-dialog { padding: 0; border-radius: 0; font-family: Open Sans; font-size: 14px; border: 0; box-shadow: 3px 4px 6px #383636, 4px 5px 6px #868282; }
        .ui-widget-header { background: #246180; border-radius: 0; border: 0; font-family: Open Sans Condensed; font-size: 15px; color: #fff; }
        .ui-button { background:none !important; border:0 !important; outline:0; }
        div.form input { display: inline-block; border:0; border-bottom:1px solid; width: 100%; box-sizing: border-box; margin-bottom:15px; padding: 5px; outline: 0;}
        div.form label { font-weight: bold; font-size: 12px; color: #555; }
        .ui-dialog-buttonset { width:100%; }
        .ui-dialog-buttonset button:first-child { float: right !important; background: #0593AD !important; color: white !important; padding: 5px 15px !important; }
        .ui-dialog-buttonset button:last-child { float: left !important; }
        .ui-dialog { display:none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-controls">
            <select id="building-select"><option value="">Select Building...</option></select>
            <input type="date" id="booking-date" required>
            <button onclick="loadGrid()">Load Rooms</button>
        </div>
        
        <div style="color: white; font-family: 'Open Sans Condensed'; font-size: 24px; letter-spacing: 2px;">
            ROOM DASHBOARD
        </div>

        <div style="color: white; font-size: 14px; display: flex; align-items: center;">
            <span id="user-welcome" style="margin-right: 15px; font-weight: bold; font-family: 'Open Sans', sans-serif;"></span>
            <span id="user-role-display"></span>
            
            <button onclick="window.location.href='my-bookings.html'" style="background: white; border: 1px solid white; color: #246180; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-left: 15px; font-weight: bold;">My Bookings</button>
            
            <button onclick="logout()" style="background: transparent; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-left: 10px;">Logout</button>
        </div>
    </header>
  
    <div class="workarea" style="overflow-x: auto;">
        <table id="main-table">
            </table>
    </div>
</div>

<div id="dialog" title="Book a Meeting Room">
    <div class="form">
        <input type="hidden" id="modal-room-id" />
        <input type="hidden" id="modal-time" />
        
        <label>Room Selected</label>
        <input type="text" id="modal-room-name" disabled />
        
        <label>Time Slot</label>
        <input type="text" id="modal-time-display" disabled />

        <label>Number of Attendees</label>
        <input type="number" id="modal-attendees" value="1" min="1" />
    </div>
</div>

<script>
    // 1. SECURITY DEADBOLT: Check for login BEFORE page loads
    if (!localStorage.getItem("userId")) {
        window.location.href = "index.html";
    }

    const API_BASE = "https://campus-booking-backend-ubdy.onrender.com/api";

    let currentFloorView = 0; // 0 = Ground Floor, 1 = First Floor
    let allFetchedRooms = []; // We will store the database results here

    // 2. Setup Page on Load
    window.onload = async function() {
        const role = localStorage.getItem("userRole");
        const userName = localStorage.getItem("userName"); // Get name from pocket

        // Set Welcome Message
        if (userName) {
            document.getElementById("user-welcome").innerText = "Welcome, " + userName + "!";
        }
        
        if (role) {
            document.getElementById("user-role-display").innerText = "Role: " + role;
        }

        document.getElementById("booking-date").valueAsDate = new Date();

        checkNotifications();

        // THE NEW FRONTEND LOCK: Set minimum date to tomorrow
        const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            // Format to YYYY-MM-DD
            const minDate = tomorrow.toISOString().split('T')[0]; 
            document.getElementById("booking-date").setAttribute("min", minDate);

        try {
            const response = await fetch(`${API_BASE}/college/buildings`);
            const buildings = await response.json();

            const select = document.getElementById("building-select");
            select.innerHTML = '<option value="">Select Building...</option>'; 
            
            buildings.forEach(b => {
                const name = b.buildingName || b.building_name || b.name || "Unknown Building";
                const id = b.building_id || b.buildingId || b.id;
                select.innerHTML += `<option value="${id}">${name}</option>`;
            });
        } catch (err) {
            console.error("Failed to fetch buildings:", err);
        }
    };

    // 3. Generate the Grid
    async function loadGrid() {
        // 1. Grab the values using the exact names from your system
        // (Check your HTML file: if your dropdown id is "buildingId", change "building_id" back to "buildingId")
        const selectedBuilding = document.getElementById("building-select").value; 
        const selectedDate = document.getElementById("booking-date").value; 

        if (!selectedBuilding) { alert("Select a building first!"); return; }
        if (!selectedDate) { alert("Please select a date first!"); return; }

        try {
            // Fetch using the building variable
            const response = await fetch(`${API_BASE}/college/buildings/${selectedBuilding}/rooms`);
            const rooms = await response.json();

            allFetchedRooms = rooms;          
            renderGridForCurrentFloor(selectedDate); // Pass the date down so the next function can use it!

        } catch (err) {
            console.error("Grid Load Error:", err);
            alert("Something went wrong. Check the console for details.");
        }
    }

    function toggleFloor() {
        currentFloorView = currentFloorView === 0 ? 1 : 0; 
        const selectedDate = document.getElementById("booking-date").value; 
        renderGridForCurrentFloor(selectedDate); 
    }

    async function renderGridForCurrentFloor(selectedDate) {
        const table = document.getElementById("main-table");
        const userRole = localStorage.getItem("role"); 
        const userId = localStorage.getItem("user_id") || localStorage.getItem("userId");

        // 1. Filter using your exact database names (room_type, floor_number)
        // *Note: Spring Boot often converts 'room_type' to 'roomType' in JSON, so we check both just in case!
        const roleFilteredRooms = allFetchedRooms.filter(room => {
            const type = room.room_type || room.roomType; 
            if (type === "Staff Room") return false; 
            if (type === "Lab" && userRole === "Student") return false; 
            return true; 
        });

        const finalVisibleRooms = roleFilteredRooms.filter(room => {
            const floor = room.floor_number !== undefined ? room.floor_number : room.floorNumber;
            return floor === currentFloorView;
        });

        const buttonTitle = currentFloorView === 0 ? "Next Level First Floor" : "Previous Level Ground Floor";

        let html = `
            <tr class="rbc">
                <th class="location" style="cursor: pointer; transition: 0.2s;" onclick="toggleFloor()" title="Click to switch floors">
                    ${buttonTitle} 
                    <p style="margin:0; font-size:12px; font-weight:normal;">${finalVisibleRooms.length} Rooms</p>
                </th>
                <th>09:00 AM</th><th>10:00 AM</th><th>11:00 AM</th>
                <th>12:00 PM</th><th>01:00 PM</th><th>02:00 PM</th>
                <th>03:00 PM</th><th>04:00 PM</th><th>05:00 PM</th> <th>06:00 PM</th>
            </tr>`;

        for (const room of finalVisibleRooms) {
            // Match your database naming
            const rName = room.room_number || room.roomNumber || "Room";
            const rCap = room.capacity || "0";
            const rId = room.room_id || room.roomId || room.id;

            html += `<tr>
                <th class="align-left">${rName}<br><span style="font-size:10px; font-weight:normal;">Cap: ${rCap}</span></th>`;
            
            try {
                // Check availability using the EXACT variables
                const bookingRes = await fetch(`${API_BASE}/bookings/availability?roomId=${rId}&date=${selectedDate}&userId=${userId}`);
                
                if (!bookingRes.ok) throw new Error("Backend failed to return availability.");
                const bookedSlots = await bookingRes.json();
                
                const slotStatus = {};
                bookedSlots.forEach(b => {
                    // Check for start_time (DB schema) or startTime (Java object)
                    const start = b.start_time || b.startTime;
                    let hr = typeof start === 'string' ? parseInt(start.split(':')[0]) : start[0];
                    slotStatus[hr] = b.status;
                });

                for (let i = 9; i <= 18; i++) {
                    const timeStr = `${i.toString().padStart(2, '0')}:00`;
                    
                    if (slotStatus[i] === "Approved" || slotStatus[i] === "Approved_Seen") {
                        html += `<td style="background-color: #ff4d4d; cursor: not-allowed; text-align: center; color: white; font-size: 12px; font-weight: bold;">Taken</td>`;
                    } else if (slotStatus[i] === "Pending") {
                        html += `<td style="background-color: orange; cursor: not-allowed; text-align: center; color: white; font-size: 12px; font-weight: bold;">Pending</td>`;
                    } else {
                        html += `<td onclick="openModal(${rId}, '${rName}', '${timeStr}')" style="cursor: pointer; transition: background 0.2s;"></td>`;
                    }
                }
            } catch (error) {
                console.error(`Failed to load bookings for Room ${rId}`, error);
                for (let i = 9; i <= 18; i++) html += `<td style="background-color: #eee;"></td>`;
            }

            html += `</tr>`;
        }

        table.innerHTML = html;
    }

    function openModal(roomId, roomNumber, timeSlot) {
        document.getElementById("modal-room-id").value = roomId;
        document.getElementById("modal-room-name").value = "Room " + roomNumber;
        document.getElementById("modal-time").value = timeSlot;
        document.getElementById("modal-time-display").value = timeSlot + " - " + (parseInt(timeSlot.split(':')[0]) + 1) + ":00";

        $("#dialog").dialog({
            width: 350,
            modal: true,
            buttons: {
                "CONFIRM BOOKING": function() {
                    submitBooking();
                    $(this).dialog("close");
                },
                "CANCEL": function() { $(this).dialog("close"); }
            }
        });
    }

    function closeModal() {
            // This tells jQuery to find the div with id="dialog" and close it!
            $("#dialog").dialog("close");
        }

    async function submitBooking() {
        const roomId = document.getElementById("modal-room-id").value;
        const date = document.getElementById("booking-date").value;
        const timeSlot = document.getElementById("modal-time").value; 
        const attendees = document.getElementById("modal-attendees").value;

        const startTime = timeSlot + ":00";
        const startHour = parseInt(timeSlot.split(':')[0]);
        const endTime = (startHour + 1).toString().padStart(2, '0') + ":00:00"; 

        const loggedInUserId = localStorage.getItem("userId");

        if (!loggedInUserId) {
            alert("Session expired. Please log in again.");
            window.location.href = "index.html";
            return;
        }

        const bookingData = {
            room: { roomId: parseInt(roomId) },
            user: { userId: parseInt(loggedInUserId) }, 
            bookingDate: date,
            startTime: startTime,
            endTime: endTime,
            attendeeCount: parseInt(attendees) || 1,
            status: "Pending" 
        };

        try {
            const response = await fetch(`${API_BASE}/bookings/book`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(bookingData)
            });

            if (response.ok) {
                alert("Request sent! Waiting for Admin approval.");
                closeModal();
                loadGrid(); // Refresh the grid to show the Orange pending box
            } else {
                // THIS IS THE CRITICAL ADDITION:
                // If Java blocks the request (Spam or Capacity), it grabs Java's exact error message and alerts the user!
                const errorMessage = await response.text();
                alert(errorMessage); 
            }
        } catch (error) {
            console.error("Error submitting booking:", error);
            alert("Frontend Error: " + error.message);
        }
    }

    // 4. Clean Logout Function
    function logout() {
        localStorage.removeItem("userId");
        localStorage.removeItem("userName");
        localStorage.removeItem("userRole");
        alert("You have been logged out.");
        window.location.href = "index.html";
    }

    // THE NEW MASTER NOTIFICATION SYSTEM
    async function checkNotifications() {
            const userId = localStorage.getItem("userId");
            try {
                const res = await fetch(`${API_BASE}/bookings/user/${userId}`);
                const bookings = await res.json();
                
                // Filter into categories
                const newlyApproved = bookings.filter(b => b.status === "Approved");
                const newlyDenied = bookings.filter(b => b.status === "Denied");
                const newlyCancelled = bookings.filter(b => b.status === "Cancelled");
                
                // If nothing is new, do nothing!
                if (newlyApproved.length === 0 && newlyDenied.length === 0 && newlyCancelled.length === 0) return;
                
                // 1. Build the Master Alert Message
                let msg = "📢 BOOKING UPDATES:\n\n";
                
                if (newlyApproved.length > 0) {
                    msg += "✅ APPROVED:\n";
                    newlyApproved.forEach(b => msg += `- Room ${b.room?.roomNumber || "Unknown"} on ${b.bookingDate} at ${b.startTime}\n`);
                    msg += "\n";
                }
                if (newlyDenied.length > 0) {
                    msg += "❌ DENIED:\n";
                    newlyDenied.forEach(b => msg += `- Room ${b.room?.roomNumber || "Unknown"} on ${b.bookingDate} at ${b.startTime}\n`);
                    msg += "\n";
                }
                if (newlyCancelled.length > 0) {
                    msg += "⚠️ CANCELLED BY ADMIN:\n";
                    newlyCancelled.forEach(b => msg += `- Room ${b.room?.roomNumber || "Unknown"} on ${b.bookingDate} at ${b.startTime}\n`);
                }
                
                // 2. Show the popup!
                alert(msg.trim());
                
                // 3. Mark them all as "Seen" in the database
                const updatePromises = [];
                newlyApproved.forEach(b => updatePromises.push(fetch(`${API_BASE}/bookings/${b.bookingId || b.id}/status?status=Approved_Seen`, { method: 'PUT' })));
                newlyDenied.forEach(b => updatePromises.push(fetch(`${API_BASE}/bookings/${b.bookingId || b.id}/status?status=Denied_Seen`, { method: 'PUT' })));
                newlyCancelled.forEach(b => updatePromises.push(fetch(`${API_BASE}/bookings/${b.bookingId || b.id}/status?status=Cancelled_Seen`, { method: 'PUT' })));
                
                await Promise.all(updatePromises);

            } catch (err) { console.error("Failed to check notifications", err); }
        }
</script>

</body>
</html>
